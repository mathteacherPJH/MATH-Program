<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이미지 데이터의 처리 3 - 두 이미지의 합성</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            /* 배경색을 요청하신 #FBF9F4로 변경 */
            --c-bg-main: #FBF9F4;
            --c-bg-card: #FDFDFB;
            --c-text-main: #1A3D2F;
            --c-text-muted: #5A7365;
            --c-border: #E2E2E6;
            --c-tab-active: #EFEFED;
            --c-accent: #2A5C45;
            --c-accent-hover: #1E4331;
            --c-save-bg: #E28523;
            --c-save-hover: #C9741B;
            --c-reset-bg: #EB5757;
            --c-reset-hover: #D14343;
        }

        body {
            font-family: "Malgun Gothic", -apple-system, sans-serif;
            background-color: var(--c-bg-main);
            color: var(--c-text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        /* 1. 배경 도트무늬 패턴 제거 (기존 패턴 코드를 비워둠) */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* 2. 인터랙티브 신경망 애니메이션용 캔버스 고정 */
        #bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 상단 대시보드 헤더 영역 */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px 20px 10px;
            z-index: 2;
        }

        .btn-back {
            background: transparent;
            border: none;
            color: var(--c-text-main);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn-back:hover {
            opacity: 0.7;
        }

        .header-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--c-text-main);
            letter-spacing: 2px;
        }

        /* 3분할 메인 레이아웃 비율 고정 및 안정화 */
        .main-container {
            display: flex;
            flex: 1;
            gap: 15px;
            min-height: 0; 
            margin-bottom: 15px;
            z-index: 2;
        }

        .card {
            background-color: var(--c-bg-card);
            border: 1px solid var(--c-border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            min-width: 0;
            box-shadow: 0 2px 8px rgba(26, 61, 47, 0.02);
        }

        /* 왼쪽 패널: 이미지 A, B 위아래 배치 */
        .panel-left {
            flex: 1;
            min-width: 180px;
            max-width: 280px;
            gap: 10px;
        }
        /* 중앙 패널: 합성 결과 배치 */
        .panel-center {
            flex: 2;
            min-width: 300px;
        }
        /* 오른쪽 패널: 행렬 P 시각화 배치 */
        .panel-right {
            flex: 1;
            min-width: 200px;
            max-width: 300px;
        }

        .panel-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--c-text-main);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 드롭존 및 뷰어 공통 */
        .drop-zone {
            flex: 1;
            border: 2px dashed var(--c-border);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--c-text-muted);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            background: #fff;
            font-size: 12px;
            text-align: center;
        }
        .drop-zone.hover {
            border-color: var(--c-accent);
            background: #f4f7f5;
        }
        .drop-zone canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .display-zone {
            flex: 1;
            border: 1px solid var(--c-border);
            border-radius: 6px;
            position: relative;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .display-zone canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 행렬 P 전용 스크롤박스 컨테이너 */
        .matrix-scroll-container {
            flex: 1;
            border: 1px solid var(--c-border);
            border-radius: 6px;
            background: #fff;
            overflow: auto; 
            position: relative;
        }
        
        .matrix-scroll-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .matrix-scroll-container::-webkit-scrollbar-thumb {
            background: var(--c-border);
            border-radius: 4px;
        }
        .matrix-scroll-container::-webkit-scrollbar-thumb:hover {
            background: var(--c-text-muted);
        }

        .resolution-bar {
            font-size: 11px;
            color: var(--c-text-muted);
            margin-top: 4px;
            text-align: center;
        }

        .btn {
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 13px;
            font-weight: bold;
            padding: 10px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .btn-save { background-color: var(--c-save-bg); width: 100%; margin-top: 8px;}
        .btn-save:hover { background-color: var(--c-save-hover); }
        .btn-reset { background-color: var(--c-reset-bg); padding: 4px 0; font-size: 11px; white-space: nowrap; text-align: center; width: 100%;}
        .btn-reset:hover { background-color: var(--c-reset-hover); }

        /* 하단 제어판 전체 컨테이너 보정 */
        .bottom-panel {
            display: flex;
            gap: 15px;
            height: 140px; 
            min-height: 140px;
            flex-shrink: 0; 
            z-index: 2;
        }
        .bottom-full-card {
            background-color: var(--c-bg-card);
            border: 1px solid var(--c-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            width: 100%;
            padding: 12px 15px;
            box-sizing: border-box;
            gap: 15px;
            min-width: 0;
            box-shadow: 0 2px 8px rgba(26, 61, 47, 0.02);
        }

        /* 1구역: 합성 방식 선택 영역 폭 고정 */
        .area-mode-control {
            width: 140px;
            min-width: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-shrink: 0;
        }
        .mode-control-title {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 6px;
            color: var(--c-text-main);
        }
        .mode-btn-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .btn-mode-choice {
            border: 1px solid var(--c-border);
            border-radius: 4px;
            padding: 5px 0;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            background: var(--c-bg-main);
            color: var(--c-text-main);
            text-align: center;
        }
        .btn-mode-choice.active {
            background: var(--c-accent);
            color: #FFFFFF;
            border-color: var(--c-accent);
        }

        .v-divider {
            width: 1px;
            background-color: var(--c-border);
            height: 75%;
            flex-shrink: 0;
        }

        /* 2구역: 슬라이더 조작 영역 유연성 및 최소폭 강제 */
        .area-sliders {
            flex: 2; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 250px; 
            flex-shrink: 1;
        }
        .control-row {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .control-title-label {
            font-size: 12px;
            font-weight: bold;
            width: 110px; 
            flex-shrink: 0;
            white-space: nowrap;
        }
        .control-label {
            font-size: 11px;
            width: 70px;
            flex-shrink: 0;
            text-align: right;
            white-space: nowrap;
        }
        .input-box {
            width: 45px;
            height: 22px;
            text-align: center;
            font-family: "Consolas", monospace;
            font-weight: bold;
            border: 1px solid var(--c-border);
            border-radius: 4px;
            outline: none;
            font-size: 11px;
            color: var(--c-text-main);
            flex-shrink: 0;
        }
        .slider {
            flex: 1; 
            cursor: pointer;
            min-width: 50px;
        }

        /* 원리 2 마스크 제어 영역 패널 내부 정돈 */
        .mask-control-grid {
            display: flex;
            width: 100%;
            gap: 20px;
            align-items: center;
        }
        .mask-col-shape {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 95px;
            flex-shrink: 0;
        }
        .mask-col-size {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .brush-shape-group {
            display: flex;
            gap: 4px;
        }
        .btn-shape-choice {
            flex: 1;
            border: 1px solid var(--c-border);
            background: var(--c-bg-main);
            color: var(--c-text-main);
            padding: 4px 0;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-align: center;
            white-space: nowrap;
        }
        .btn-shape-choice.active {
            background: var(--c-text-main);
            color: #fff;
            border-color: var(--c-text-main);
        }

        /* 3구역: 우측 수식 영역 한계 설정 */
        .area-formulas {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 25%; 
            min-width: 180px; 
            max-width: 260px; 
            flex-shrink: 0; 
        }
        .formula-box {
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--c-bg-main);
            border: 1px solid var(--c-border);
            border-radius: 6px;
            height: 75px;
            padding: 4px;
            box-sizing: border-box;
            width: 100%;
            overflow: hidden;
        }
        .formula-box mjx-container {
            font-size: 20px !important; 
            max-width: 100% !important;
            margin: 0 !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            white-space: nowrap !important;
            color: var(--c-text-main);
        }

        #fileInputA, #fileInputB { display: none; }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="header-container">
        <button class="btn-back" onclick="history.back()">← BACK</button>
        <div class="header-title">BLENDING</div>
    </div>

    <div class="main-container">
        <div class="card panel-left">
            <div class="panel-title">📥 입력 이미지 행렬</div>
            <div id="dropZoneA" class="drop-zone" onclick="document.getElementById('fileInputA').click()">
                <span id="txtPromptA">➕ 이미지 A 등록 (A)</span>
                <canvas id="canvasPreviewA"></canvas>
            </div>
            <div id="resLabelA" class="resolution-bar">A: ---</div>
            
            <div id="dropZoneB" class="drop-zone" onclick="document.getElementById('fileInputB').click()">
                <span id="txtPromptB">➕ 이미지 B 등록 (B)</span>
                <canvas id="canvasPreviewB"></canvas>
            </div>
            <div id="resLabelB" class="resolution-bar">B: ---</div>
            
            <input type="file" id="fileInputA" accept="image/*" onchange="handleFileSelect(event, 'A')">
            <input type="file" id="fileInputB" accept="image/*" onchange="handleFileSelect(event, 'B')">
        </div>

        <div class="card panel-center">
            <div class="panel-title">🖥️ 합성 완료 이미지 행렬 (M)</div>
            <div id="resultZone" class="display-zone">
                <canvas id="imageCanvas"></canvas>
            </div>
            <div id="resLabelCombined" class="resolution-bar">합성 해상도: ---</div>
            <button class="btn btn-save" onclick="saveProcessedImage()">💾 합성 이미지 저장하기</button>
        </div>

        <div class="card panel-right" id="rightMatrixPanel" style="display:none;">
            <div class="panel-title">📊 마스크 행렬 상태 (P)</div>
            <div class="matrix-scroll-container">
                <canvas id="matrixPCanvas"></canvas>
            </div>
            <div class="resolution-bar">성분 값: 0 (흰색) / 1 (검은색)</div>
        </div>
    </div>

    <div class="bottom-panel">
        <div class="bottom-full-card">
            
            <div class="area-mode-control">
                <div class="mode-control-title">⚙️ 합성 방식 선택</div>
                <div class="mode-btn-group">
                    <button id="btnMode1" class="btn-mode-choice active" onclick="setBlendMode(1)">원리 1 (볼록결합)</button>
                    <button id="btnMode2" class="btn-mode-choice" onclick="setBlendMode(2)">원리 2 (아다마르 곱)</button>
                </div>
            </div>

            <div class="v-divider"></div>

            <div class="area-sliders">
                <div id="rowWeight" class="control-row">
                    <span class="control-title-label">🎛️ 가중치 비율 (t)</span>
                    <span class="control-label">A 비중 (t)</span>
                    <input type="text" id="entryWeight" class="input-box" value="0.50" onchange="onEntryWeightChanged()">
                    <input type="range" id="sliderWeight" class="slider" min="0" max="100" step="1" value="50" oninput="onSliderWeightMove(this.value)">
                </div>
                
                <div id="rowMaskControl" class="mask-control-grid" style="display:none;">
                    <div class="mask-col-shape">
                        <button id="btnShapeCircle" class="btn-shape-choice active" onclick="setBrushShape('circle')" style="margin-bottom: 3px;">동그라미</button>
                        <button id="btnShapeSquare" class="btn-shape-choice" onclick="setBrushShape('square')" style="margin-bottom: 3px;">네모</button>
                        <button class="btn btn-reset" onclick="resetMaskMatrix()">초기화</button>
                    </div>
                    
                    <div class="mask-col-size">
                        <div style="display:flex; align-items:center; width:100%; gap:10px;">
                            <span class="control-title-label" style="width:70px; font-size:12px; white-space:nowrap;">📏 크기 설정</span>
                            <input type="text" id="entryBrushSize" class="input-box" value="25" style="width:38px;" onchange="onBrushSizeEntryChanged()">
                            <input type="range" id="sliderBrushSize" class="slider" min="5" max="80" step="1" value="25" oninput="onBrushSizeSliderMove(this.value)">
                        </div>
                    </div>
                </div>
            </div>

            <div class="v-divider"></div>

            <div class="area-formulas">
                <div id="formulaDisplay" class="formula-box">
                    $$tA + (1-t)B$$
                </div>
            </div>

        </div>
    </div>

<script>
    // --- 딥 그린 톤 조율 인터랙티브 배경 엔진 ---
    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    let particles = [];
    let mouse = { x: null, y: null, radius: 110 };

    function resizeBgCanvas() {
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
        initParticles();
    }

    class Particle {
        constructor() {
            this.x = Math.random() * bgCanvas.width;
            this.y = Math.random() * bgCanvas.height;
            this.vx = (Math.random() - 0.5) * 0.4; 
            this.vy = (Math.random() - 0.5) * 0.4;
            this.baseRadius = Math.random() * 2 + 1.5; 
            this.radius = this.baseRadius;
        }
        draw() {
            bgCtx.beginPath();
            bgCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            bgCtx.fillStyle = 'rgba(42, 92, 69, 0.15)';
            bgCtx.fill();
        }
        update() {
            if (this.x < 0 || this.x > bgCanvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > bgCanvas.height) this.vy *= -1;
            
            this.x += this.vx;
            this.y += this.vy;

            if (mouse.x !== null && mouse.y !== null) {
                let dx = this.x - mouse.x;
                let dy = this.y - mouse.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    let angle = Math.atan2(dy, dx);
                    this.x += Math.cos(angle) * force * 2;
                    this.y += Math.sin(angle) * force * 2;
                }
            }
            this.draw();
        }
    }

    function initParticles() {
        particles = [];
        const count = Math.floor((bgCanvas.width * bgCanvas.height) / 12000);
        for (let i = 0; i < count; i++) {
            particles.push(new Particle());
        }
    }

    function animateParticles() {
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            for (let j = i + 1; j < particles.length; j++) {
                let dx = particles[i].x - particles[j].x;
                let dy = particles[i].y - particles[j].y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 100) {
                    let alpha = (100 - dist) / 100 * 0.12;
                    bgCtx.beginPath();
                    bgCtx.moveTo(particles[i].x, particles[i].y);
                    bgCtx.lineTo(particles[j].x, particles[j].y);
                    bgCtx.strokeStyle = `rgba(42, 92, 69, ${alpha})`;
                    bgCtx.lineWidth = 0.8;
                    bgCtx.stroke();
                }
            }
        }
        requestAnimationFrame(animateParticles);
    }

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
    window.addEventListener('mouseleave', () => {
        mouse.x = null;
        mouse.y = null;
    });
    window.addEventListener('resize', resizeBgCanvas);
    resizeBgCanvas();
    animateParticles();


    // --- 기존 비즈니스 코드 로직 유지 보존 ---
    let imgA = null, imgB = null;
    let offscreenCanvas = null, offscreenCtx = null;
    let maskMatrix = null; 

    let scaleFactor = 1.0;
    let padX = 0, padY = 0;
    let newW = 0, newH = 0;

    let isDrawingMask = false;
    let blendMode = 1; 
    let blendWeight = 0.5; 

    let brushShape = 'circle';
    let brushRadius = 25; 
    let currentMouseX = -1000, currentMouseY = -1000; 

    const imageCanvas = document.getElementById('imageCanvas');
    const imageCtx = imageCanvas.getContext('2d');
    const matrixPCanvas = document.getElementById('matrixPCanvas');
    const matrixPCtx = matrixPCanvas.getContext('2d');
    const rightMatrixPanel = document.getElementById('rightMatrixPanel');
    
    const sliderWeight = document.getElementById('sliderWeight');
    const entryWeight = document.getElementById('entryWeight');
    const sliderBrushSize = document.getElementById('sliderBrushSize');
    const entryBrushSize = document.getElementById('entryBrushSize');
    const resLabelA = document.getElementById('resLabelA');
    const resLabelB = document.getElementById('resLabelB');
    const resLabelCombined = document.getElementById('resLabelCombined');
    const formulaDisplay = document.getElementById('formulaDisplay');

    function handleFileSelect(e, target) {
        if (e.target.files.length > 0) loadImageFile(e.target.files[0], target);
    }

    function loadImageFile(file, target) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                if (target === 'A') {
                    imgA = img;
                    resLabelA.innerText = `A 해상도: ${imgA.width}x${imgA.height}`;
                    drawPreview('canvasPreviewA', imgA);
                    document.getElementById('txtPromptA').style.display = 'none';
                } else {
                    imgB = img;
                    resLabelB.innerText = `B 해상도: ${imgB.width}x${imgB.height}`;
                    drawPreview('canvasPreviewB', imgB);
                    document.getElementById('txtPromptB').style.display = 'none';
                }

                if (imgA && imgB) {
                    initMaskMatrix(imgA.width, imgA.height);
                    calculateGeometry();
                    executeComposition();
                }
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    }

    function drawPreview(canvasId, img) {
        const canv = document.getElementById(canvasId);
        const ctx = canv.getContext('2d');
        canv.width = canv.clientWidth;
        canv.height = canv.clientHeight;
        ctx.clearRect(0, 0, canv.width, canv.height);
        
        let s = Math.min(canv.width / img.width, canv.height / img.height);
        let w = img.width * s;
        let h = img.height * s;
        let x = (canv.width - w) / 2;
        let y = (canv.height - h) / 2;
        ctx.drawImage(img, x, y, w, h);
    }

    function initMaskMatrix(w, h) {
        maskMatrix = new Uint8Array(w * h); 
    }

    function resetMaskMatrix() {
        if (maskMatrix) {
            maskMatrix.fill(0); 
            executeComposition();
        }
    }

    function calculateGeometry() {
        if (!imgA || !imgB) return;
        const containerW = document.getElementById('resultZone').clientWidth;
        const containerH = document.getElementById('resultZone').clientHeight;

        const transW = imgA.width;
        const transH = imgA.height;

        resLabelCombined.innerText = `합성 해상도 : ${transW} x ${transH}`;

        scaleFactor = Math.min(containerW / transW, containerH / transH);
        newW = transW * scaleFactor;
        newH = transH * scaleFactor;
        padX = (containerW - newW) / 2;
        padY = (containerH - newH) / 2;

        imageCanvas.width = containerW;
        imageCanvas.height = containerH;
    }

    function setBrushShape(shape) {
        brushShape = shape;
        document.getElementById('btnShapeCircle').classList.toggle('active', shape === 'circle');
        document.getElementById('btnShapeSquare').classList.toggle('active', shape === 'square');
        if (imgA && imgB) repaintCanvasWithOverlay();
    }

    function onBrushSizeSliderMove(val) {
        brushRadius = parseInt(val);
        entryBrushSize.value = brushRadius;
        if (imgA && imgB) repaintCanvasWithOverlay();
    }

    function onBrushSizeEntryChanged() {
        let val = parseInt(entryBrushSize.value);
        if (isNaN(val) || val < 5 || val > 80) {
            alert("가이드 크기는 5에서 80 사이의 정수여야 합니다.");
            entryBrushSize.value = brushRadius;
        } else {
            brushRadius = val;
            sliderBrushSize.value = val;
            if (imgA && imgB) repaintCanvasWithOverlay();
        }
    }

    function traceMaskInteraction(e) {
        if (!imgA || !maskMatrix || blendMode !== 2) return;
        
        const rect = imageCanvas.getBoundingClientRect();
        currentMouseX = e.clientX - rect.left;
        currentMouseY = e.clientY - rect.top;

        const origX = Math.floor((currentMouseX - padX) / scaleFactor);
        const origY = Math.floor((currentMouseY - padY) / scaleFactor);

        const w = imgA.width;
        const h = imgA.height;
        const mappedRadius = Math.max(1, Math.floor(brushRadius / scaleFactor)); 

        if (origX >= -mappedRadius && origX < w + mappedRadius && origY >= -mappedRadius && origY < h + mappedRadius) {
            for (let y = origY - mappedRadius; y <= origY + mappedRadius; y++) {
                for (let x = origX - mappedRadius; x <= origX + mappedRadius; x++) {
                    if (x >= 0 && x < w && y >= 0 && y < h) {
                        if (brushShape === 'circle') {
                            if ((x - origX)**2 + (y - origY)**2 <= mappedRadius**2) {
                                maskMatrix[y * w + x] = 1; 
                            }
                        } else {
                            maskMatrix[y * w + x] = 1; 
                        }
                    }
                }
            }
            executeComposition(); 
        }
    }
    
    imageCanvas.addEventListener('mousedown', (e) => { 
        if (blendMode === 2) { isDrawingMask = true; traceMaskInteraction(e); } 
    });
    
    imageCanvas.addEventListener('mousemove', (e) => { 
        const rect = imageCanvas.getBoundingClientRect();
        currentMouseX = e.clientX - rect.left;
        currentMouseY = e.clientY - rect.top;

        if (blendMode === 2) {
            if (isDrawingMask) {
                traceMaskInteraction(e);
            } else {
                repaintCanvasWithOverlay(); 
            }
        }
    });

    imageCanvas.addEventListener('mouseleave', () => {
        currentMouseX = -1000; currentMouseY = -1000; 
        if (blendMode === 2 && imgA) repaintCanvasWithOverlay();
    });

    window.addEventListener('mouseup', () => { isDrawingMask = false; });

    function setBlendMode(mode) {
        blendMode = mode;
        document.getElementById('btnMode1').classList.toggle('active', mode === 1);
        document.getElementById('btnMode2').classList.toggle('active', mode === 2);
        
        document.getElementById('rowWeight').style.display = (mode === 1) ? 'flex' : 'none';
        document.getElementById('rowMaskControl').style.display = (mode === 2) ? 'flex' : 'none';
        
        rightMatrixPanel.style.display = (mode === 2) ? 'flex' : 'none';

        imageCanvas.style.cursor = (mode === 2) ? 'none' : 'default'; 

        if (imgA && imgB) {
            calculateGeometry(); 
            executeComposition();
        } else {
            updateFormulaUI();
        }
    }

    function onSliderWeightMove(val) {
        blendWeight = parseFloat(val) / 100;
        entryWeight.value = blendWeight.toFixed(2);
        executeComposition();
    }

    function onEntryWeightChanged() {
        let val = parseFloat(entryWeight.value);
        if (isNaN(val) || val < 0 || val > 1) {
            alert("가중치 t는 0.00에서 1.00 사이의 실수여야 합니다.");
            entryWeight.value = blendWeight.toFixed(2);
        } else {
            blendWeight = val;
            sliderWeight.value = Math.round(val * 100);
            executeComposition();
        }
    }

    function updateFormulaUI() {
        if (blendMode === 1) {
            let t = blendWeight.toFixed(2);
            let omt = (1 - blendWeight).toFixed(2);
            formulaDisplay.innerHTML = `$$\\mathbf{M} = ${t}\\mathbf{A} + ${omt}\\mathbf{B}$$`;
        } else {
            formulaDisplay.innerHTML = `$$\\mathbf{M} = \\mathbf{A} \\circ \\mathbf{P} + \\mathbf{B} \\circ (\\mathbf{J} - \\mathbf{P})$$`;
        }
        if (window.MathJax && window.MathJax.typesetPromise) {
            MathJax.typesetPromise([formulaDisplay]);
        }
    }

    function drawLiveMatrixP() {
        if (!maskMatrix || !imgA || blendMode !== 2) return;
        const w = imgA.width;
        const h = imgA.height;

        let mCanvas = document.createElement('canvas'); mCanvas.width = w; mCanvas.height = h;
        let mCtx = mCanvas.getContext('2d');
        let mImgData = mCtx.createImageData(w, h);
        let mData = mImgData.data;

        for (let i = 0; i < maskMatrix.length; i++) {
            let val = maskMatrix[i] === 1 ? 0 : 255; 
            let idx = i * 4;
            mData[idx] = val;
            mData[idx+1] = val;
            mData[idx+2] = val;
            mData[idx+3] = 255; 
        }
        mCtx.putImageData(mImgData, 0, 0);

        const pCanvasW = Math.max(220, matrixPCanvas.parentElement.clientWidth - 10);
        const pCanvasH = Math.max(220, matrixPCanvas.parentElement.clientHeight - 10);
        matrixPCanvas.width = pCanvasW;
        matrixPCanvas.height = pCanvasH;

        matrixPCtx.clearRect(0, 0, pCanvasW, pCanvasH);
        let s = Math.min(pCanvasW / w, pCanvasH / h);
        let nW = w * s; let nH = h * s;
        let pX = (pCanvasW - nW) / 2; let pY = (pCanvasH - nH) / 2;

        matrixPCtx.fillStyle = "#FFFFFF"; 
        matrixPCtx.fillRect(pX, pY, nW, nH);
        matrixPCtx.drawImage(mCanvas, pX, pY, nW, nH);
        matrixPCtx.strokeStyle = "var(--c-border)";
        matrixPCtx.strokeRect(pX, pY, nW, nH);
    }

    function repaintCanvasWithOverlay() {
        imageCtx.clearRect(0, 0, imageCanvas.width, imageCanvas.height);
        imageCtx.fillStyle = "#FFFFFF";
        imageCtx.fillRect(padX, padY, newW, newH);
        imageCtx.drawImage(offscreenCanvas, padX, padY, newW, newH);

        if (blendMode === 2 && currentMouseX >= padX && currentMouseX < padX + newW && currentMouseY >= padY && currentMouseY < padY + newH) {
            imageCtx.save();
            imageCtx.strokeStyle = "#EB5757"; 
            imageCtx.lineWidth = 2;
            imageCtx.beginPath();
            
            if (brushShape === 'circle') {
                imageCtx.arc(currentMouseX, currentMouseY, brushRadius, 0, 2 * Math.PI);
            } else {
                imageCtx.strokeRect(currentMouseX - brushRadius, currentMouseY - brushRadius, brushRadius * 2, brushRadius * 2);
            }
            imageCtx.stroke();
            imageCtx.restore();
        }
    }

    function executeComposition() {
        if (!imgA || !imgB) return;

        const w = imgA.width;
        const h = imgA.height;

        offscreenCanvas = document.createElement('canvas');
        offscreenCanvas.width = w;
        offscreenCanvas.height = h;
        offscreenCtx = offscreenCanvas.getContext('2d');

        let canvasA = document.createElement('canvas'); canvasA.width = w; canvasA.height = h;
        let ctxA = canvasA.getContext('2d');
        ctxA.drawImage(imgA, 0, 0, w, h);
        let dataA = ctxA.getImageData(0, 0, w, h).data;

        let canvasB = document.createElement('canvas'); canvasB.width = w; canvasB.height = h;
        let ctxB = canvasB.getContext('2d');
        ctxB.drawImage(imgB, 0, 0, w, h); 
        let dataB = ctxB.getImageData(0, 0, w, h).data;

        let imgOut = offscreenCtx.createImageData(w, h);
        let dataOut = imgOut.data;

        for (let i = 0; i < dataA.length; i += 4) {
            let idx = i / 4;

            if (blendMode === 1) {
                dataOut[i]   = blendWeight * dataA[i]   + (1 - blendWeight) * dataB[i];   
                dataOut[i+1] = blendWeight * dataA[i+1] + (1 - blendWeight) * dataB[i+1]; 
                dataOut[i+2] = blendWeight * dataA[i+2] + (1 - blendWeight) * dataB[i+2]; 
                dataOut[i+3] = 255; 
            } else {
                let P = maskMatrix[idx]; 
                dataOut[i]   = dataA[i]   * P + dataB[i]   * (1 - P);
                dataOut[i+1] = dataA[i+1] * P + dataB[i+1] * (1 - P);
                dataOut[i+2] = dataA[i+2] * P + dataB[i+2] * (1 - P);
                dataOut[i+3] = 255;
            }
        }
        offscreenCtx.putImageData(imgOut, 0, 0);

        repaintCanvasWithOverlay();

        if (blendMode === 2) {
            drawLiveMatrixP();
        }

        updateFormulaUI();
    }

    function saveProcessedImage() {
        if (!imgA || !imgB) {
            alert("합성할 두 이미지가 모두 업로드되어야 저장이 가능합니다.");
            return;
        }
        const link = document.createElement('a');
        link.download = 'chapter_3_image_composition_final.png';
        link.href = offscreenCanvas.toDataURL('image/png');
        link.click();
    }
</script>
