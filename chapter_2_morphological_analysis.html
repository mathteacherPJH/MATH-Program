<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어집합 프로그램</title>
    <style>
        :root {
            --c-bg-main: #FBF9F4; 
            --c-bg-card: rgba(255, 255, 255, 0.73); 
            --c-text-main: #2C2A29;
            --c-text-muted: #7D7569;
            --c-border: rgba(44, 42, 41, 0.1);
            --c-accent: #2383E2;
            --c-accent-hover: #1A6CB8;
            --c-brand-green: #1B4332;
            --c-tag-bg: #E8F5E9;
            --c-tag-text: #2E7D32;
            --c-removed-bg: #FFEBEE;
            --c-removed-text: #C62828;
            --c-clean-bg: #FFF9C4;
            --c-clean-text: #F57F17;
            --c-tab-bg: #F4F1EA;
        }

        body {
            font-family: 'Malgun Gothic', -apple-system, sans-serif;
            background-color: var(--c-bg-main);
            color: var(--c-text-main);
            margin: 0;
            padding: 24px;
            padding-top: 85px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            letter-spacing: 0.03em;
            position: relative;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        #neural-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(251, 249, 244, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--c-border);
            z-index: 1000;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .back-btn {
            background: transparent;
            border: none;
            color: var(--c-brand-green);
            font-family: "Consolas", monospace;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0.15em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            transition: all 0.2s ease;
        }
        .back-btn:hover {
            transform: translateX(-3px);
            opacity: 0.8;
        }

        .navbar-brand-text {
            font-size: 14px; 
            font-weight: bold; 
            color: var(--c-brand-green); 
            letter-spacing: 0.08em; 
        }

        .main-layout {
            display: flex;
            width: 100%; 
            height: calc(100vh - 110px); 
            gap: 20px;
            position: relative;
            z-index: 10;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--c-bg-card);
            border: 1px solid var(--c-border);
            border-radius: 12px;
            padding: 24px;
            box-sizing: border-box;
            backdrop-filter: blur(6px);
            box-shadow: 0 10px 30px rgba(44, 42, 41, 0.03);
            display: flex;
            flex-direction: column;
        }

        .left-panel {
            flex: 1.2; 
            height: 100%;
        }

        .textarea-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-bottom: 16px;
        }

        textarea {
            width: 100%;
            flex: 1; 
            padding: 16px;
            box-sizing: border-box;
            border: 1px solid var(--c-border);
            border-radius: 8px;
            resize: none;
            font-family: inherit;
            font-size: 15px;
            line-height: 1.6;
            background-color: rgba(255, 255, 255, 0.8);
            color: var(--c-text-main);
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus {
            border-color: var(--c-brand-green);
        }

        .run-btn {
            width: 100%;
            padding: 14px 20px;
            background-color: var(--c-brand-green);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: opacity 0.2s;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 12px rgba(27, 67, 50, 0.15);
        }
        .run-btn:hover {
            opacity: 0.9;
        }

        .right-panel {
            flex: 2;
            height: 100%;
            overflow: hidden;
            gap: 14px;
            position: relative;
        }

        .nav-group {
            display: flex;
            gap: 4px;
            background: var(--c-tab-bg); 
            padding: 4px;
            border-radius: 8px;
            border: 1px solid rgba(44, 42, 41, 0.05);
            flex-shrink: 0;
        }
        .nav-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 8px 4px;
            font-size: 12px;
            font-weight: bold;
            color: var(--c-text-muted);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            white-space: nowrap;
            text-align: center;
        }
        .nav-btn.active {
            background: #FFFFFF;
            color: var(--c-brand-green); 
            box-shadow: 0 2px 6px rgba(44,42,41,0.08);
        }

        .right-panel-content {
            width: 100%;
            height: 100%;
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding-right: 6px; 
            box-sizing: border-box;
        }

        .result-section {
            display: flex;
            flex-direction: column;
            width: 100%;
            box-sizing: border-box;
        }
        .result-section.hidden {
            display: none !important;
        }
        .result-section h3 {
            margin: 0 0 8px 4px;
            font-size: 14px;
            color: var(--c-text-muted);
            font-weight: bold;
        }

        .result-box { 
            background-color: rgba(244, 241, 234, 0.6); 
            padding: 14px; 
            border-radius: 8px; 
            min-height: 48px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: flex-start;
            gap: 8px; 
            align-items: center;
            border: 1px solid var(--c-border);
            box-sizing: border-box;
            width: 100%; 
        }
        
        .tag {
            display: inline-block;
            background-color: #EFEFED;
            color: var(--c-text-main);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            border: 1px solid var(--c-border);
            font-weight: 500;
        }
        .removed {
            background-color: var(--c-removed-bg) !important;
            color: var(--c-removed-text) !important;
            text-decoration: line-through;
            border-color: rgba(198, 40, 40, 0.15) !important;
        }
        
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        
        .add-section { display: flex; gap: 6px; align-items: center; }
        .add-input {
            padding: 6px 10px;
            border: 1px solid var(--c-border);
            border-radius: 4px;
            width: 120px;
            font-size: 13px;
            outline: none;
            background: white;
        }
        .add-input:focus { border-color: var(--c-accent); }
        .add-btn {
            padding: 6px 12px;
            background-color: var(--c-accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        .add-btn:hover { background-color: var(--c-accent-hover); }

        .editable-tag { 
            display: inline-flex; 
            align-items: center; 
            justify-content: space-between;
            background-color: var(--c-tag-bg); 
            color: var(--c-tag-text); 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-size: 13px; 
            border: 1px solid rgba(165, 214, 167, 0.6); 
            box-sizing: border-box;
            width: calc(25% - 6px); 
            min-width: 104px;
        }
        .editable-tag input { 
            border: none; 
            background: transparent; 
            color: var(--c-tag-text); 
            font-size: 13px; 
            font-family: inherit; 
            width: 100%;
            text-align: center; 
            font-weight: bold; 
        }
        .editable-tag input:focus {
            outline: none;
            background-color: #fff;
            border-radius: 2px;
        }
        .delete-btn {
            margin-left: 4px;
            cursor: pointer;
            color: var(--c-removed-text);
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
            line-height: 1;
        }

        .right-panel-content::-webkit-scrollbar {
            width: 6px;
        }
        .right-panel-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .right-panel-content::-webkit-scrollbar-thumb {
            background: rgba(44, 42, 41, 0.15);
            border-radius: 3px;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(251, 249, 244, 0.85);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(27, 67, 50, 0.1);
            border-left-color: var(--c-brand-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        .loading-text {
            font-size: 14px;
            font-weight: bold;
            color: var(--c-brand-green);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<canvas id="neural-canvas"></canvas>

<!-- 상단 네비게이션 바 -->
<nav class="top-navbar">
    <button onclick="if(document.referrer) { history.back(); } else { location.href='./index.html'; }" class="back-btn">
        ← BACK
    </button>
    <div class="navbar-brand-text">
        단어집합 프로그램
    </div>
</nav>

<div class="main-layout">
    <div class="card left-panel">
        <div class="textarea-container">
            <textarea id="inputText" placeholder="여기에 분석할 문장을 입력하세요."></textarea>
        </div>
        <!-- 외부 연딩 의존성이 제거되어 상시 즉시 실행 가능하도록 수정 -->
        <button id="submitBtn" class="run-btn" onclick="processNLPWithLoading()">분석 및 변환 실행 ⚡</button>
    </div>

    <div class="card right-panel">
        <div id="loadingOverlay" class="loading-overlay">
            <div class="spinner"></div>
            <div id="loadingText" class="loading-text">형태소 정규화 및 단어집합 구축 중...</div>
        </div>

        <div class="nav-group">
            <button id="tab_all" class="nav-btn active" onclick="switchTab('all')">전체보기</button>
            <button id="tab_1" class="nav-btn" onclick="switchTab('1')">1. 형태소 분석</button>
            <button id="tab_2" class="nav-btn" onclick="switchTab('2')">2. 불용어 제거</button>
            <button id="tab_3" class="nav-btn" onclick="switchTab('3')">3. 기본형 변환</button>
            <button id="tab_4" class="nav-btn" onclick="switchTab('4')">4. 사용자 수정</button>
        </div>

        <div class="right-panel-content">
            <div id="sec_1" class="result-section">
                <h3>1. 형태소 정규화 결과</h3>
                <div id="morphemeResult" class="result-box"></div>
            </div>

            <div id="sec_2" class="result-section">
                <h3>2. 불용어 및 조사 제거 결과</h3>
                <div id="cleanResult" class="result-box"></div>
            </div>

            <div id="sec_3" class="result-section">
                <h3>3. 기본형 변환</h3>
                <div id="lemmaResult" class="result-box"></div>
            </div>

            <div id="sec_4" class="result-section">
                <div class="header-flex">
                    <h3>4. 사용자 수정 및 단어집합 구성</h3>
                    <div class="add-section">
                        <input type="text" id="newWordInput" class="add-input" placeholder="새 단어 입력">
                        <button class="add-btn" onclick="addToken()">추가</button>
                    </div>
                </div>
                <div class="result-box" id="editorContainer"></div>
            </div>
        </div>
    </div>
</div>

<script>
function switchTab(tabId) {
    const tabs = ['all', '1', '2', '3', '4'];
    tabs.forEach(t => {
        document.getElementById(`tab_${t}`).classList.remove('active');
        if(t !== 'all') document.getElementById(`sec_${t}`).classList.add('hidden');
    });
    document.getElementById(`tab_${tabId}`).classList.add('active');
    if (tabId === 'all') {
        tabs.forEach(t => { if(t !== 'all') document.getElementById(`sec_${t}`).classList.remove('hidden'); });
    } else {
        document.getElementById(`sec_${tabId}`).classList.remove('hidden');
    }
}

let finalTokens = [];
const stopwords = new Set(["참", "그러나", "그리고", "이", "그", "저", "무척", "가장", "매우", "더", "과", "와", "을", "를", "은", "는", "이", "가", "에", "의", "에게", "에서", "도", "만", "으로", "로"]);

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

async function processNLPWithLoading() {
    const text = document.getElementById("inputText").value.trim();
    if (!text) { alert("문장을 입력해주세요!"); return; }

    const overlay = document.getElementById("loadingOverlay");
    overlay.classList.add("active");
    await sleep(450); // 로딩 스피너의 연출 감성을 극대화하기 위한 시간 버퍼

    try {
        processNLP(text);
    } catch(e) {
        console.error(e);
        alert("분석 처리 도중 예기치 못한 에러가 발생했습니다.");
    } finally {
        overlay.classList.remove("active");
    }
}

function processNLP(text) {
    // 특수문자 전처리 분리 후 어절 단위 슬라이싱
    const words = text.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "").split(/\s+/);
    
    let morphemeHtml = "";
    let cleanHtml = "";
    let lemmaHtml = "";
    finalTokens = [];
    const uniqueLemmas = new Set();

    words.forEach(word => {
        if (!word) return;

        // 1단계: 조사(Josa) 정밀 매칭 및 분리 처리
        const josaRegex = /(은|는|이|가|을|를|의|에|에서|에게|과|와|도|만|으로|로|하고|부터|까지|고|서)$/;
        let basePart = word;
        let josaPart = "";
        const matchJosa = word.match(josaRegex);

        if (matchJosa && word.length > matchJosa[0].length) {
            basePart = word.replace(josaRegex, "");
            josaPart = matchJosa[0];
        }

        // 형태소 결과 빌드
        if (stopwords.has(basePart)) {
            morphemeHtml += `<span class="tag removed">${basePart}(체언/어근)</span>`;
        } else {
            morphemeHtml += `<span class="tag">${basePart}(체언/어근)</span>`;
            cleanHtml += `<span class="tag" style="background-color: var(--c-clean-bg); color: var(--c-clean-text); border-color: rgba(245,127,23,0.15);">${basePart}</span>`;
        }

        if (josaPart) {
            morphemeHtml += `<span class="tag removed">${josaPart}(조사)</span>`;
        }

        // 2단계: 불용어 판단 및 원형(기본형) 복원 고도화 모듈
        if (stopwords.has(basePart) || basePart.length === 0) return;

        let lemma = basePart;
        let isDerived = false;

        if (/(했다|했습니다|합니다|하였다|한다|하느라|하면)$/.test(basePart)) {
            lemma = basePart.replace(/(했다|했습니다|합니다|하였다|한다|하느라|하면)$/, "") + "하다";
            isDerived = true;
        }

        if (!isDerived) {
            if (/^만드/.test(basePart) || /^만들/.test(basePart)) { lemma = "만들다"; isDerived = true; }
            else if (basePart.startsWith("흘러") || basePart.startsWith("흘렀")) { lemma = "흐르다"; isDerived = true; }
            else if (basePart.startsWith("골라") || basePart.startsWith("골랐")) { lemma = "고르다"; isDerived = true; }
            else if (basePart.startsWith("불러") || basePart.startsWith("불렀")) { lemma = "부르다"; isDerived = true; }
            else if (basePart.startsWith("달라") || basePart.startsWith("달랐")) { lemma = "다르다"; isDerived = true; }
            else if (/^지어/.test(basePart) || /^지었/.test(basePart) || /^지으/.test(basePart)) { lemma = "짓다"; isDerived = true; }
            else if (basePart.startsWith("도와") || basePart.startsWith("도왔")) { lemma = "돕다"; isDerived = true; }
            else if (basePart.startsWith("아름다")) { lemma = "아름답다"; isDerived = true; }
            else if (basePart.startsWith("추워") || basePart.startsWith("추운")) { lemma = "춥다"; isDerived = true; }
            else if (basePart.startsWith("예뻐") || basePart.startsWith("예쁜")) { lemma = "예쁘다"; isDerived = true; }
            else if (basePart === "써" || basePart === "써서") { lemma = "쓰다"; isDerived = true; }
            else if (basePart === "커" || basePart === "커서") { lemma = "크다"; isDerived = true; }

            if (!isDerived && /(었다|았다|였다|으며|으리|겠다|고|지|게|다|는|ㄴ|은|던)$/.test(basePart)) {
                let stem = basePart.replace(/(었다|았다|였다|으며|으리|겠다|고|지|게|다|는|ㄴ|은|던)$/, "");
                if (stem.endsWith("었") || stem.endsWith("았")) stem = stem.slice(0, -1);
                if (stem.length > 0) {
                    lemma = stem + "다";
                    isDerived = true;
                }
            }
        }

        // 최종 중복 배제 단어집합 필터링
        if (!stopwords.has(lemma) && lemma.length > 0) {
            if (!uniqueLemmas.has(lemma)) {
                uniqueLemmas.add(lemma);
                lemmaHtml += `<span class="tag" style="background-color: var(--c-tag-bg); color: var(--c-tag-text); border-color: rgba(46,125,50,0.15);">${lemma}</span>`;
                finalTokens.push(lemma);
            }
        }
    });

    document.getElementById("morphemeResult").innerHTML = morphemeHtml || "분석 결과가 없습니다.";
    document.getElementById("cleanResult").innerHTML = cleanHtml || "남은 토큰이 없습니다.";
    document.getElementById("lemmaResult").innerHTML = lemmaHtml || "남은 토큰이 없습니다.";
    renderEditor();
}

function renderEditor() {
    const container = document.getElementById("editorContainer");
    if (finalTokens.length === 0) { container.innerHTML = "출력할 토큰이 없습니다."; return; }
    let html = "";
    finalTokens.forEach((token, index) => {
        html += `
            <span class="editable-tag">
                <input type="text" value="${token}" onchange="updateToken(${index}, this.value)">
                <span class="delete-btn" onclick="deleteToken(${index})">×</span>
            </span>
        `;
    });
    container.innerHTML = html;
}

function updateToken(index, newValue) { finalTokens[index] = newValue.trim(); }
function deleteToken(index) { finalTokens.splice(index, 1); renderEditor(); }
function addToken() {
    const input = document.getElementById("newWordInput");
    const value = input.value.trim();
    if (!value) { alert("추가할 단어를 입력하세요!"); return; }
    if (!finalTokens.includes(value)) { finalTokens.push(value); renderEditor(); }
    input.value = "";
}

const bgCanvas = document.getElementById('neural-canvas');
const bgCtx = bgCanvas.getContext('2d');
let particles = [];
const mouse = { x: null, y: null, radius: 150 };

function resizeBgCanvas() {
    bgCanvas.width = window.innerWidth;
    bgCanvas.height = window.innerHeight;
    initParticles();
}

class Particle {
    constructor() {
        this.x = Math.random() * bgCanvas.width;
        this.y = Math.random() * bgCanvas.height;
        this.vx = (Math.random() - 0.5) * 0.35;
        this.vy = (Math.random() - 0.5) * 0.35;
        this.radius = Math.random() * 2 + 1.5; 
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > bgCanvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > bgCanvas.height) this.vy *= -1;
        let dx = mouse.x - this.x; let dy = mouse.y - this.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < mouse.radius) {
            const force = (mouse.radius - distance) / mouse.radius;
            this.x -= dx * force * 0.03; this.y -= dy * force * 0.03;
        }
    }
    draw() {
        bgCtx.beginPath(); bgCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        bgCtx.fillStyle = 'rgba(27, 67, 50, 0.15)'; bgCtx.fill();
    }
}

function initParticles() {
    particles = [];
    const particleCount = Math.floor((bgCanvas.width * bgCanvas.height) / 9000);
    for (let i = 0; i < particleCount; i++) particles.push(new Particle());
}

function animateBg() {
    bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
    for (let i = 0; i < particles.length; i++) {
        particles[i].update(); particles[i].draw();
        for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x; const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 110) {
                bgCtx.beginPath(); bgCtx.moveTo(particles[i].x, particles[i].y); bgCtx.lineTo(particles[j].x, particles[j].y);
                bgCtx.strokeStyle = `rgba(27, 67, 50, ${0.08 * (1 - dist / 110)})`; bgCtx.lineWidth = 1.0; bgCtx.stroke();
            }
        }
    }
    requestAnimationFrame(animateBg);
}

window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
window.addEventListener('resize', resizeBgCanvas);
window.addEventListener('DOMContentLoaded', () => { resizeBgCanvas(); animateBg(); });
</script>
</body>
