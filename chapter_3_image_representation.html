<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이미지 데이터의 표현</title>
    <style>
        :root {
            /* 테마 컬러 적용 */
            --c-bg-main: #FBF9F4;
            --c-bg-card: #FDFDFB;
            --c-text-main: #1A3D2F;
            --c-text-muted: #5A7365;
            --c-border: #E2E2E6;
            --c-tab-active: #EFEFED;
            --c-accent: #2A5C45;
            --c-accent-hover: #1E4331;
        }

        body {
            font-family: "Malgun Gothic", -apple-system, sans-serif;
            font-size: 16px;
            background-color: var(--c-bg-main);
            color: var(--c-text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        /* 1. 인터랙티브 신경망 애니메이션용 캔버스 고정 */
        #bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 상단 대시보드 헤더 영역 및 구분선 */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px 15px 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--c-border);
            z-index: 2;
        }

        .btn-back {
            background: transparent;
            border: none;
            color: var(--c-text-main);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn-back:hover {
            opacity: 0.7;
        }

        .header-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--c-text-main);
            letter-spacing: 2px;
        }

        /* 메인 콘텐츠 앱 컨테이너 */
        .app-container {
            width: 100%;
            max-width: 900px;
            height: 420px;
            background: var(--c-bg-card);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(26, 61, 47, 0.06);
            border: 1px solid var(--c-border);
            border-radius: 8px;
            overflow: hidden;
            margin: auto;
            z-index: 2;
        }

        .tab-header {
            display: flex;
            border-bottom: 2px solid var(--c-border);
            background: #EFEFED;
        }
        .tab-btn {
            padding: 14px 28px;
            border: 1px solid transparent;
            border-bottom: none;
            background: transparent;
            font-size: 15px;
            color: var(--c-text-muted);
            cursor: pointer;
            outline: none;
            margin-bottom: -2px;
            transition: background 0.2s, color 0.2s;
        }
        .tab-btn.active {
            background: var(--c-bg-card);
            border-color: var(--c-border);
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            font-weight: bold;
            color: var(--c-text-main);
        }

        .tab-content {
            flex: 1;
            display: none;
            background: var(--c-bg-card);
        }
        .tab-content.active {
            display: flex;
        }

        /* 탭 1: RGB 색상 확인 */
        .rgb-tab-inner {
            width: 100%;
            padding: 30px 40px;
            display: flex;
            align-items: center;
            gap: 45px;
            box-sizing: border-box;
        }
        .preview-box {
            width: 240px;
            height: 240px;
            background-color: #FFFFFF;
            border: 2px solid var(--c-text-main);
            border-radius: 4px;
            flex-shrink: 0;
        }
        .rgb-controls {
            flex: 1;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            row-gap: 20px;
            column-gap: 15px;
        }
        .rgb-label {
            width: 25px;
            font-size: 18px;
            font-weight: bold;
            color: var(--c-text-main);
        }
        .rgb-slider {
            width: 100%;
            margin: 0;
            cursor: pointer;
            height: 8px;
        }
        
        .spin-container {
            display: flex;
            align-items: center;
        }
        .num-input {
            width: 65px;
            height: 34px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid var(--c-border);
            color: var(--c-text-main);
            background-color: white;
            box-sizing: border-box;
            outline: none;
            border-radius: 4px 0 0 4px;
        }
        .spin-btns {
            display: flex;
            flex-direction: column;
            margin-left: -1px;
        }
        .spin-btn {
            width: 24px;
            height: 17px;
            font-size: 10px;
            line-height: 15px;
            text-align: center;
            border: 1px solid var(--c-border);
            background-color: #EFEFEF;
            color: var(--c-text-main);
            cursor: pointer;
            outline: none;
            padding: 0;
        }
        .spin-btn:active { background-color: #dcdcdc; }

        .hex-row {
            grid-column: span 3;
            display: flex;
            align-items: center;
            margin-top: 15px;
            gap: 10px;
        }
        .hex-label { font-size: 16px; font-weight: bold; color: var(--c-text-main); }
        .hex-value { font-weight: bold; font-size: 20px; color: var(--c-accent); }
        .dropper-btn {
            margin-left: auto;
            width: 120px;
            height: 38px;
            background: var(--c-accent);
            color: #FFFFFF;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .dropper-btn:hover { background: var(--c-accent-hover); }
        .dropper-btn:active { opacity: 0.8; }


        /* 탭 2: RGB값 추적기 스타일 */
        .tracker-tab-inner {
            width: 100%;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            gap: 35px;
            box-sizing: border-box;
            justify-content: center;
        }

        /* 정보 표기 스크린 (가독성 개선을 위해 가로 폭 대폭 확장) */
        .tracker-info-screen {
            width: 420px; /* 기존 320px에서 420px로 확장 */
            padding: 25px;
            border-radius: 8px;
            background-color: #FAFAFA;
            border: 1px solid var(--c-border);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px dashed var(--c-border);
            padding-bottom: 12px;
        }
        .info-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-title {
            font-size: 15px;
            font-weight: bold;
            color: var(--c-text-muted);
            white-space: nowrap;
        }

        .info-val {
            font-size: 20px; /* 가독성을 위해 폰트 확대 */
            font-weight: bold;
            color: var(--c-text-main);
            font-family: "Courier New", Courier, monospace;
            white-space: nowrap;
        }

        .info-val.rgb {
            color: var(--c-accent);
        }

        /* 우측 비주얼 피드백 영역 */
        .tracker-interactive-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* 추적 중인 현재 색상을 크게 보여주는 영역 */
        .color-patch {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--c-text-main);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background-color: #FFFFFF;
            transition: background-color 0.05s ease;
        }

        .toggle-tracker-btn {
            width: 180px;
            height: 46px;
            background: var(--c-accent);
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 3px 6px rgba(42, 92, 69, 0.2);
        }
        .toggle-tracker-btn:hover { background: var(--c-accent-hover); }
        .toggle-tracker-btn.active {
            background: #A94442; /* 비활성화 유도용 붉은 톤 */
        }
        .toggle-tracker-btn:active { transform: scale(0.98); }

        /* 화면에 따라다니는 커스텀 스캐너(조준선) */
        #customScanner {
            position: fixed;
            width: 60px;
            height: 60px;
            border: 2px solid var(--c-text-main);
            border-radius: 50%;
            pointer-events: none;
            display: none;
            z-index: 9999;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2), inset 0 0 8px rgba(0,0,0,0.15);
            transform: translate(-50%, -50%);
        }
        #customScanner::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div id="customScanner"></div>

    <div class="header-container">
        <button class="btn-back" onclick="history.back()">← BACK</button>
        <div class="header-title">IMAGE REPRESENTATION</div>
    </div>

    <div class="app-container">
        <div class="tab-header">
            <button class="tab-btn active" onclick="switchTab(event, 'rgb-tab')">RGB 색상 확인</button>
            <button class="tab-btn" onclick="switchTab(event, 'tracker-tab')">RGB값 추적기</button>
        </div>

        <div id="rgb-tab" class="tab-content active">
            <div class="rgb-tab-inner">
                <div id="previewBox" class="preview-box"></div>
                <div class="rgb-controls">
                    <div class="rgb-label">R:</div>
                    <input type="range" id="rSlider" class="rgb-slider" min="0" max="255" value="255">
                    <div class="spin-container">
                        <input type="text" id="rEdit" class="num-input" value="255">
                        <div class="spin-btns">
                            <button class="spin-btn" onmousedown="startRepeat(stepRgb, 'r', 1)" onmouseup="stopRepeat()" onmouseleave="stopRepeat()">▲</button>
                            <button class="spin-btn" onmousedown="startRepeat(stepRgb, 'r', -1)" onmouseup="stopRepeat()" onmouseleave="stopRepeat()">▼</button>
                        </div>
                    </div>

                    <div class="rgb-label">G:</div>
                    <input type="range" id="gSlider" class="rgb-slider" min="0" max="255" value="255">
                    <div class="spin-container">
                        <input type="text" id="gEdit" class="num-input" value="255">
                        <div class="spin-btns">
                            <button class="spin-btn" onmousedown="startRepeat(stepRgb, 'g', 1)" onmouseup="stopRepeat()" onmouseleave="stopRepeat()">▲</button>
                            <button class="spin-btn" onmousedown="startRepeat(stepRgb, 'g', -1)" onmouseup="stopRepeat()" onmouseleave="stopRepeat()">▼</button>
                        </div>
                    </div>

                    <div class="rgb-label">B:</div>
                    <input type="range" id="bSlider" class="rgb-slider" min="0" max="255" value="255">
                    <div class="spin-container">
                        <input type="text" id="bEdit" class="num-input" value="255">
                        <div class="spin-btns">
                            <button class="spin-btn" onmousedown="startRepeat(stepRgb, 'b', 1)" onmouseup="stopRepeat()" onmouseleave="stopRepeat()">▲</button>
                            <button class="spin-btn" onmousedown="startRepeat(stepRgb, 'b', -1)" onmouseup="stopRepeat()" onmouseleave="stopRepeat()">▼</button>
                        </div>
                    </div>

                    <div class="hex-row">
                        <div class="hex-label">Hex:</div>
                        <div id="hexValLabel" class="hex-value">#FFFFFF</div>
                        <button id="dropperBtn" class="dropper-btn" onclick="triggerDropper()">스포이드</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tracker-tab" class="tab-content">
            <div class="tracker-tab-inner">
                
                <div class="tracker-info-screen">
                    <div class="info-row">
                        <span class="info-title">화면 좌표 (X, Y)</span>
                        <span id="trackCoord" class="info-val">X: 0, Y: 0</span>
                    </div>
                    <div class="info-row">
                        <span class="info-title">RGB 벡터 데이터</span>
                        <span id="trackRgb" class="info-val rgb">[0, 0, 0]</span>
                    </div>
                    <div class="info-row">
                        <span class="info-title">헥사 코드 (HEX)</span>
                        <span id="trackHex" class="info-val">#000000</span>
                    </div>
                </div>

                <div class="tracker-interactive-panel">
                    <div id="trackerColorPatch" class="color-patch"></div>
                    <button id="toggleTrackerBtn" class="toggle-tracker-btn" onclick="toggleTracker(event)">추적기 활성화</button>
                </div>

            </div>
        </div>
    </div>

<script>
    // --- 딥 그린 톤 조율 인터랙티브 배경 엔진 ---
    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    let particles = [];
    let mouse = { x: null, y: null, radius: 110 };

    function resizeBgCanvas() {
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
        initParticles();
    }

    class Particle {
        constructor() {
            this.x = Math.random() * bgCanvas.width;
            this.y = Math.random() * bgCanvas.height;
            this.vx = (Math.random() - 0.5) * 0.4; 
            this.vy = (Math.random() - 0.5) * 0.4;
            this.baseRadius = Math.random() * 2 + 1.5; 
            this.radius = this.baseRadius;
        }
        draw() {
            bgCtx.beginPath();
            bgCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            bgCtx.fillStyle = 'rgba(42, 92, 69, 0.15)';
            bgCtx.fill();
        }
        update() {
            if (this.x < 0 || this.x > bgCanvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > bgCanvas.height) this.vy *= -1;
            
            this.x += this.vx;
            this.y += this.vy;

            if (mouse.x !== null && mouse.y !== null) {
                let dx = this.x - mouse.x;
                let dy = this.y - mouse.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    let angle = Math.atan2(dy, dx);
                    this.x += Math.cos(angle) * force * 2;
                    this.y += Math.sin(angle) * force * 2;
                }
            }
            this.draw();
        }
    }

    function initParticles() {
        particles = [];
        const count = Math.floor((bgCanvas.width * bgCanvas.height) / 12000);
        for (let i = 0; i < count; i++) {
            particles.push(new Particle());
        }
    }

    function animateParticles() {
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            for (let j = i + 1; j < particles.length; j++) {
                let dx = particles[i].x - particles[j].x;
                let dy = particles[i].y - particles[j].y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 100) {
                    let alpha = (100 - dist) / 100 * 0.12;
                    bgCtx.beginPath();
                    bgCtx.moveTo(particles[i].x, particles[i].y);
                    bgCtx.lineTo(particles[j].x, particles[j].y);
                    bgCtx.strokeStyle = `rgba(42, 92, 69, ${alpha})`;
                    bgCtx.lineWidth = 0.8;
                    bgCtx.stroke();
                }
            }
        }
        requestAnimationFrame(animateParticles);
    }

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
    window.addEventListener('mouseleave', () => {
        mouse.x = null;
        mouse.y = null;
    });
    window.addEventListener('resize', resizeBgCanvas);
    resizeBgCanvas();
    animateParticles();


    // ------------------ AutoRepeat (꾹 누르기) 구현을 위한 전역 변수 ------------------
    let repeatTimeout = null;
    let repeatInterval = null;

    function startRepeat(callback, ...args) {
        callback(...args);
        repeatTimeout = setTimeout(() => {
            repeatInterval = setInterval(() => {
                callback(...args);
            }, 40);
        }, 300);
    }

    function stopRepeat() {
        clearTimeout(repeatTimeout);
        clearInterval(repeatInterval);
    }

    // ------------------ 탭 전환 로직 ------------------
    function switchTab(evt, tabId) {
        const tabContents = document.querySelectorAll('.tab-content');
        tabContents.forEach(content => content.classList.remove('active'));

        const tabButtons = document.querySelectorAll('.tab-btn');
        tabButtons.forEach(btn => btn.classList.remove('active'));

        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');

        // 탭을 전환할 때 추적기 기능은 자동 비활성화 처리
        if (tabId !== 'tracker-tab' && isTracking) {
            disableTracker();
        }
    }

    // ------------------ 헬퍼 함수 ------------------
    function clamp(val) {
        return Math.max(0, Math.min(255, val));
    }
    function componentToHex(c) {
        let hex = c.toString(16).toUpperCase();
        return hex.length == 1 ? "0" + hex : hex;
    }
    function rgbToHex(r, g, b) {
        return "#" + componentToHex(r) + componentToHex(g) + componentToHex(b);
    }

    // ------------------ 탭 1: RGB 색상 로직 ------------------
    const rSlider = document.getElementById('rSlider');
    const gSlider = document.getElementById('gSlider');
    const bSlider = document.getElementById('bSlider');
    const rEdit = document.getElementById('rEdit');
    const gEdit = document.getElementById('gEdit');
    const bEdit = document.getElementById('bEdit');
    const previewBox = document.getElementById('previewBox');
    const hexValLabel = document.getElementById('hexValLabel');

    function updateRgbFromSliders() {
        const r = parseInt(rSlider.value);
        const g = parseInt(gSlider.value);
        const b = parseInt(bSlider.value);
        
        rEdit.value = r;
        gEdit.value = g;
        bEdit.value = b;
        
        const hex = rgbToHex(r, g, b);
        previewBox.style.backgroundColor = hex;
        hexValLabel.innerText = hex;
    }

    function updateRgbFromEdits() {
        let r = parseInt(rEdit.value) || 0;
        let g = parseInt(gEdit.value) || 0;
        let b = parseInt(bEdit.value) || 0;

        r = clamp(r); g = clamp(g); b = clamp(b);

        rSlider.value = r;
        gSlider.value = g;
        bSlider.value = b;

        const hex = rgbToHex(r, g, b);
        previewBox.style.backgroundColor = hex;
        hexValLabel.innerText = hex;
    }

    function stepRgb(channel, amount) {
        const editEl = document.getElementById(`${channel}Edit`);
        let val = parseInt(editEl.value) || 0;
        editEl.value = clamp(val + amount);
        updateRgbFromEdits();
    }

    [rSlider, gSlider, bSlider].forEach(slider => slider.addEventListener('input', updateRgbFromSliders));
    [rEdit, gEdit, bEdit].forEach(edit => edit.addEventListener('input', updateRgbFromEdits));

    // 스포이드 기능
    async function triggerDropper() {
        if (!window.EyeDropper) {
            alert('이 브라우저는 스포이드 기능을 지원하지 않습니다. 크롬, 엣지, 웨일 브라우저를 사용해 주세요.');
            return;
        }
        const dropperBtn = document.getElementById('dropperBtn');
        dropperBtn.innerText = "화면 클릭!";
        
        const eyeDropper = new EyeDropper();
        try {
            const result = await eyeDropper.open();
            const hex = result.sRGBHex.toUpperCase();
            
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);

            rEdit.value = r;
            gEdit.value = g;
            bEdit.value = b;
            updateRgbFromEdits();
        } catch (e) {
        } finally {
            dropperBtn.innerText = "스포이드";
        }
    }


    // ------------------ 탭 2: RGB값 추적기 로직 ------------------
    let isTracking = false;
    const toggleTrackerBtn = document.getElementById('toggleTrackerBtn');
    const customScanner = document.getElementById('customScanner');

    const trackCoord = document.getElementById('trackCoord');
    const trackRgb = document.getElementById('trackRgb');
    const trackHex = document.getElementById('trackHex');
    const trackerColorPatch = document.getElementById('trackerColorPatch');

    // 마지막으로 기록된 색상 버퍼 (창밖으로 나갔을 때 홀딩용)
    let lastR = 0, lastG = 0, lastB = 0;

    function toggleTracker(e) {
        if (!isTracking) {
            isTracking = true;
            toggleTrackerBtn.innerText = "추적기 비활성화";
            toggleTrackerBtn.classList.add('active');
            customScanner.style.display = 'block';
            document.body.style.cursor = 'none'; // 기본 커서 숨김
            
            // Pointer Capture를 활성화하여 창을 벗어나도 포인터 좌표를 브라우저가 끝까지 추적하게 함
            try {
                toggleTrackerBtn.setPointerCapture(e.pointerId);
            } catch (err) {}

            window.addEventListener('pointermove', handleTrackerMove);
        } else {
            disableTracker();
        }
    }

    function disableTracker() {
        isTracking = false;
        toggleTrackerBtn.innerText = "추적기 활성화";
        toggleTrackerBtn.classList.remove('active');
        customScanner.style.display = 'none';
        document.body.style.cursor = 'default'; // 기본 커서 복원
        
        // Pointer Capture 명시적 해제
        try {
            toggleTrackerBtn.releasePointerCapture();
        } catch (err) {}

        window.removeEventListener('pointermove', handleTrackerMove);
    }

    function handleTrackerMove(e) {
        const x = e.clientX;
        const y = e.clientY;

        // 1. 조준선(커스텀 스캐너) 위치 실시간 업데이트
        customScanner.style.left = `${x}px`;
        customScanner.style.top = `${y}px`;

        // 2. 창 내부/외부 판단 및 좌표 보정 기록
        trackCoord.innerText = `X: ${Math.round(x)}, Y: ${Math.round(y)}`;

        // 창 경계면 확인
        const insideX = x >= 0 && x <= window.innerWidth;
        const insideY = y >= 0 && y <= window.innerHeight;

        if (insideX && insideY) {
            // [창 내부인 경우] 실시간 DOM 분석을 통한 색상 검출
            customScanner.style.display = 'none';
            const targetElement = document.elementFromPoint(x, y);
            customScanner.style.display = 'block';

            if (targetElement) {
                const computedStyle = window.getComputedStyle(targetElement);
                const bgColor = computedStyle.backgroundColor;

                let rgbMatch = bgColor.match(/\d+/g);
                
                if (!rgbMatch || bgColor === 'transparent' || bgColor === 'rgba(0, 0, 0, 0)') {
                    rgbMatch = [251, 249, 244]; // 기본 테마 메인 배경 컬러
                }

                lastR = parseInt(rgbMatch[0]);
                lastG = parseInt(rgbMatch[1]);
                lastB = parseInt(rgbMatch[2]);
            }
        } else {
            // [창 외부인 경우] 픽셀 데이터 직접 검출이 차단되므로 경계값 버퍼 유지
            // (좌표는 계속 실시간 변경되나 RGB와 색 패치는 직전 상태로 세련되게 멈춤)
        }

        // 3. 공통 UI 바인딩 및 시각 효과 처리
        const hex = rgbToHex(lastR, lastG, lastB);
        trackRgb.innerText = `[${lastR}, ${lastG}, ${lastB}]`;
        trackHex.innerText = hex;
        trackerColorPatch.style.backgroundColor = hex;
        customScanner.style.backgroundColor = hex;
    }

    // 초기 실행 세팅
    updateRgbFromSliders();
</script>

</body>
</html>
