<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이미지 데이터의 표현</title>
    <style>
        :root {
            /* 이전 프로그램과 동일한 테마 컬러 적용 */
            --c-bg-main: #FBF9F4;
            --c-bg-card: #FDFDFB;
            --c-text-main: #1A3D2F;
            --c-text-muted: #5A7365;
            --c-border: #E2E2E6;
            --c-tab-active: #EFEFED;
            --c-accent: #2A5C45;
            --c-accent-hover: #1E4331;
        }

        body {
            font-family: "Malgun Gothic", -apple-system, sans-serif;
            font-size: 16px;
            background-color: var(--c-bg-main);
            color: var(--c-text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        /* 1. 인터랙티브 신경망 애니메이션용 캔버스 고정 */
        #bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 상단 대시보드 헤더 영역 및 구분선 */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px 15px 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--c-border);
            z-index: 2;
        }

        .btn-back {
            background: transparent;
            border: none;
            color: var(--c-text-main);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn-back:hover {
            opacity: 0.7;
        }

        .header-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--c-text-main);
            letter-spacing: 2px;
        }

        /* 메인 콘텐츠 앱 컨테이너 */
        .app-container {
            width: 100%;
            max-width: 900px;
            height: 420px;
            background: var(--c-bg-card);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(26, 61, 47, 0.06);
            border: 1px solid var(--c-border);
            border-radius: 8px;
            overflow: hidden;
            margin: auto;
            z-index: 2;
        }

        .tab-header {
            display: flex;
            border-bottom: 2px solid var(--c-border);
            background: #EFEFED;
        }
        .tab-btn {
            padding: 14px 28px;
            border: 1px solid transparent;
            border-bottom: none;
            background: transparent;
            font-size: 15px;
            color: var(--c-text-muted);
            cursor: pointer;
            outline: none;
            margin-bottom: -2px;
            transition: background 0.2s, color 0.2s;
        }
        .tab-btn.active {
            background: var(--c-bg-card);
            border-color: var(--c-border);
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            font-weight: bold;
            color: var(--c-text-main);
        }

        .tab-content {
            flex: 1;
            display: none;
            background: var(--c-bg-card);
        }
        .tab-content.active {
            display: flex;
        }

        /* 탭 1: RGB 색상 확인 */
        .rgb-tab-inner {
            width: 100%;
            padding: 30px 40px;
            display: flex;
            align-items: center;
            gap: 45px;
            box-sizing: border-box;
        }
        .preview-box {
            width: 240px;
            height: 240px;
            background-color: #FFFFFF;
            border: 2px solid var(--c-text-main);
            border-radius: 4px;
            flex-shrink: 0;
        }
        .rgb-controls {
            flex: 1;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            row-gap: 20px;
            column-gap: 15px;
        }
        .rgb-label {
            width: 25px;
            font-size: 18px;
            font-weight: bold;
            color: var(--c-text-main);
        }
        .rgb-slider {
            width: 100%;
            margin: 0;
            cursor: pointer;
            height: 8px;
        }
        
        .spin-container {
            display: flex;
            align-items: center;
        }
        .num-input {
            width: 65px;
            height: 34px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid var(--c-border);
            color: var(--c-text-main);
            background-color: white;
            box-sizing: border-box;
            outline: none;
            border-radius: 4px 0 0 4px;
        }
        .spin-btns {
            display: flex;
            flex-direction: column;
            margin-left: -1px;
        }
        .spin-btn {
            width: 24px;
            height: 17px;
            font-size: 10px;
            line-height: 15px;
            text-align: center;
            border: 1px solid var(--c-border);
            background-color: #EFEFEF;
            color: var(--c-text-main);
            cursor: pointer;
            outline: none;
            padding: 0;
        }
        .spin-btn:active { background-color: #dcdcdc; }

        .hex-row {
            grid-column: span 3;
            display: flex;
            align-items: center;
            margin-top: 15px;
            gap: 10px;
        }
        .hex-label { font-size: 16px; font-weight: bold; color: var(--c-text-main); }
        .hex-value { font-weight: bold; font-size: 20px; color: var(--c-accent); }
        .dropper-btn {
            margin-left: auto;
            width: 120px;
            height: 38px;
            background: var(--c-accent);
            color: #FFFFFF;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .dropper-btn:hover { background: var(--c-accent-hover); }
        .dropper-btn:active { opacity: 0.8; }

        /* 탭 2: 이미지 행렬화 */
        .matrix-tab-inner {
            width: 100%;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 40px;
            box-sizing: border-box;
            justify-content: center;
        }
        .matrix-left-grid {
            display: grid;
            grid-template-columns: repeat(2, 120px);
            grid-template-rows: repeat(2, 120px);
            gap: 8px;
        }
        .matrix-cell {
            width: 120px;
            height: 120px;
            background-color: #FFFFFF;
            border: 2px solid var(--c-text-main);
            border-radius: 4px;
        }
        .matrix-right-grid {
            display: grid;
            grid-template-columns: repeat(2, 250px);
            grid-template-rows: repeat(2, 120px);
            gap: 12px;
        }
        .matrix-input-container {
            width: 250px;
            height: 120px;
            border: 1px solid var(--c-border);
            border-radius: 6px;
            background-color: #FAFAFA;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px;
        }
        .matrix-sub-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .matrix-num-input {
            width: 55px;
            height: 30px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            border: 1px solid var(--c-border);
            background-color: white;
            box-sizing: border-box;
            outline: none;
            border-radius: 4px;
        }
        .matrix-num-input.r { color: red; border-color: #ffcccc; }
        .matrix-num-input.g { color: green; border-color: #ccffcc; }
        .matrix-num-input.b { color: blue; border-color: #ccccff; }
        
        .matrix-spin-btns {
            display: flex;
            gap: 4px;
        }
        .matrix-spin-btn {
            width: 24px;
            height: 22px;
            font-size: 10px;
            line-height: 20px;
            text-align: center;
            border: 1px solid var(--c-border);
            background-color: #EFEFEF;
            color: var(--c-text-main);
            cursor: pointer;
            padding: 0;
            border-radius: 3px;
        }
        .matrix-spin-btn:active { background-color: #dcdcdc; }
    </style>
</head>

<script>
    // --- 딥 그린 톤 조율 인터랙티브 배경 엔진 ---
    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    let particles = [];
    let mouse = { x: null, y: null, radius: 110 };

    function resizeBgCanvas() {
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
        initParticles();
    }

    class Particle {
        constructor() {
            this.x = Math.random() * bgCanvas.width;
            this.y = Math.random() * bgCanvas.height;
            this.vx = (Math.random() - 0.5) * 0.4; 
            this.vy = (Math.random() - 0.5) * 0.4;
            this.baseRadius = Math.random() * 2 + 1.5; 
            this.radius = this.baseRadius;
        }
        draw() {
            bgCtx.beginPath();
            bgCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            bgCtx.fillStyle = 'rgba(42, 92, 69, 0.15)';
            bgCtx.fill();
        }
        update() {
            if (this.x < 0 || this.x > bgCanvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > bgCanvas.height) this.vy *= -1;
            
            this.x += this.vx;
            this.y += this.vy;

            if (mouse.x !== null && mouse.y !== null) {
                let dx = this.x - mouse.x;
                let dy = this.y - mouse.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    let angle = Math.atan2(dy, dx);
                    this.x += Math.cos(angle) * force * 2;
                    this.y += Math.sin(angle) * force * 2;
                }
            }
            this.draw();
        }
    }

    function initParticles() {
        particles = [];
        const count = Math.floor((bgCanvas.width * bgCanvas.height) / 12000);
        for (let i = 0; i < count; i++) {
            particles.push(new Particle());
        }
    }

    function animateParticles() {
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            for (let j = i + 1; j < particles.length; j++) {
                let dx = particles[i].x - particles[j].x;
                let dy = particles[i].y - particles[j].y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 100) {
                    let alpha = (100 - dist) / 100 * 0.12;
                    bgCtx.beginPath();
                    bgCtx.moveTo(particles[i].x, particles[i].y);
                    bgCtx.lineTo(particles[j].x, particles[j].y);
                    bgCtx.strokeStyle = `rgba(42, 92, 69, ${alpha})`;
                    bgCtx.lineWidth = 0.8;
                    bgCtx.stroke();
                }
            }
        }
        requestAnimationFrame(animateParticles);
    }

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
    window.addEventListener('mouseleave', () => {
        mouse.x = null;
        mouse.y = null;
    });
    window.addEventListener('resize', resizeBgCanvas);
    resizeBgCanvas();
    animateParticles();


    // ------------------ AutoRepeat (꾹 누르기) 구현을 위한 전역 변수 ------------------
    let repeatTimeout = null;
    let repeatInterval = null;

    function startRepeat(callback, ...args) {
        // 단일 클릭 대응
        callback(...args);
        
        // 300ms 동안 들고 있으면 40ms 주기로 연속 실행 (PyQt6 세팅인 300ms / 40ms와 동일)
        repeatTimeout = setTimeout(() => {
            repeatInterval = setInterval(() => {
                callback(...args);
            }, 40);
        }, 300);
    }

    function stopRepeat() {
        clearTimeout(repeatTimeout);
        clearInterval(repeatInterval);
    }

    // ------------------ 탭 전환 로직 ------------------
    function switchTab(evt, tabId) {
        const tabContents = document.querySelectorAll('.tab-content');
        tabContents.forEach(content => content.classList.remove('active'));

        const tabButtons = document.querySelectorAll('.tab-btn');
        tabButtons.forEach(btn => btn.classList.remove('active'));

        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    // ------------------ 헬퍼 함수 ------------------
    function clamp(val) {
        return Math.max(0, Math.min(255, val));
    }
    function componentToHex(c) {
        let hex = c.toString(16).toUpperCase();
        return hex.length == 1 ? "0" + hex : hex;
    }
    function rgbToHex(r, g, b) {
        return "#" + componentToHex(r) + componentToHex(g) + componentToHex(b);
    }

    // ------------------ 탭 1: RGB 색상 로직 ------------------
    const rSlider = document.getElementById('rSlider');
    const gSlider = document.getElementById('gSlider');
    const bSlider = document.getElementById('bSlider');
    const rEdit = document.getElementById('rEdit');
    const gEdit = document.getElementById('gEdit');
    const bEdit = document.getElementById('bEdit');
    const previewBox = document.getElementById('previewBox');
    const hexValLabel = document.getElementById('hexValLabel');

    function updateRgbFromSliders() {
        const r = parseInt(rSlider.value);
        const g = parseInt(gSlider.value);
        const b = parseInt(bSlider.value);
        
        rEdit.value = r;
        gEdit.value = g;
        bEdit.value = b;
        
        const hex = rgbToHex(r, g, b);
        previewBox.style.backgroundColor = hex;
        hexValLabel.innerText = hex;
    }

    function updateRgbFromEdits() {
        let r = parseInt(rEdit.value) || 0;
        let g = parseInt(gEdit.value) || 0;
        let b = parseInt(bEdit.value) || 0;

        r = clamp(r); g = clamp(g); b = clamp(b);

        rSlider.value = r;
        gSlider.value = g;
        bSlider.value = b;

        const hex = rgbToHex(r, g, b);
        previewBox.style.backgroundColor = hex;
        hexValLabel.innerText = hex;
    }

    function stepRgb(channel, amount) {
        const editEl = document.getElementById(`${channel}Edit`);
        let val = parseInt(editEl.value) || 0;
        editEl.value = clamp(val + amount);
        updateRgbFromEdits();
    }

    [rSlider, gSlider, bSlider].forEach(slider => slider.addEventListener('input', updateRgbFromSliders));
    [rEdit, gEdit, bEdit].forEach(edit => edit.addEventListener('input', updateRgbFromEdits));

    // 스포이드 기능
    async function triggerDropper() {
        if (!window.EyeDropper) {
            alert('이 브라우저는 스포이드 기능을 지원하지 않습니다. 크롬, 엣지, 웨일 브라우저를 사용해 주세요.');
            return;
        }
        const dropperBtn = document.getElementById('dropperBtn');
        dropperBtn.innerText = "화면 클릭!";
        
        const eyeDropper = new EyeDropper();
        try {
            const result = await eyeDropper.open();
            const hex = result.sRGBHex.toUpperCase();
            
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);

            rEdit.value = r;
            gEdit.value = g;
            bEdit.value = b;
            updateRgbFromEdits();
        } catch (e) {
        } finally {
            dropperBtn.innerText = "스포이드";
        }
    }

    // ------------------ 탭 2: 이미지 행렬화 로직 ------------------
    function updateMatrixCell(row, col) {
        const rEl = document.getElementById(`m_${row}_${col}_r`);
        const gEl = document.getElementById(`m_${row}_${col}_g`);
        const bEl = document.getElementById(`m_${row}_${col}_b`);

        let r = parseInt(rEl.value) || 0;
        let g = parseInt(gEl.value) || 0;
        let b = parseInt(bEl.value) || 0;

        r = clamp(r); g = clamp(g); b = clamp(b);

        const hex = rgbToHex(r, g, b);
        document.getElementById(`cell_${row}_${col}`).style.backgroundColor = hex;
    }

    function stepMatrix(row, col, channel, amount) {
        const editEl = document.getElementById(`m_${row}_${col}_${channel}`);
        let val = parseInt(editEl.value) || 0;
        editEl.value = clamp(val + amount);
        updateMatrixCell(row, col);
    }

    // 초기 실행 세팅
    updateRgbFromSliders();
    for(let r=0; r<2; r++){
        for(let c=0; c<2; c++){
            updateMatrixCell(r, c);
        }
    }
</script>

</body>
</html>
